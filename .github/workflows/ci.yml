name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web application
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
      APP_ENV: test
      AUTH_ALLOW_SIGN_UP: "true"
      YMHUB_REGISTRATION_ALLOWED_HOSTS: example.invalid
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Build production bundle
        run: npm run build

  security:
    name: Dependency security audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Refresh dependency lock
        run: npm install

      - name: Preserve refreshed lockfile
        uses: actions/upload-artifact@v6
        with:
          name: refreshed-package-lock
          path: package-lock.json
          if-no-files-found: error
          retention-days: 1

      - name: Run high-severity dependency audit
        run: npm audit --audit-level=high

  database:
    name: Supabase migrations and RLS tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start local Supabase
        run: npx supabase start

      - name: Rebuild database from migrations and seed
        run: npm run db:reset

      - name: Run database tests
        run: npm run db:test

      - name: Stop local Supabase
        if: always()
        run: npx supabase stop --no-backup
