name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - phase-1-foundation

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web application
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_SUPABASE_URL: http://127.0.0.1:54321
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
      APP_ENV: test
      AUTH_ALLOW_SIGN_UP: "true"
      YMHUB_CONNECTOR_MODE: mock
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run typecheck

      - name: Run unit tests
        run: npm run test

      - name: Audit high-severity dependencies
        run: npm run security:audit

      - name: Build production bundle
        run: npm run build

  database:
    name: Supabase migrations and RLS tests
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Start local Supabase
        run: npx supabase start

      - name: Rebuild database from migrations and seed
        run: npm run db:reset

      - name: Run database tests
        run: npm run db:test

      - name: Stop local Supabase
        if: always()
        run: npx supabase stop --no-backup
