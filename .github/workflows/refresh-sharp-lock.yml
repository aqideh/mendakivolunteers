name: Refresh sharp lockfile

on:
  push:
    branches:
      - phaseone
    paths:
      - package.json
      - .github/workflows/refresh-sharp-lock.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
        with:
          ref: phaseone

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install patched sharp and refresh lockfile
        run: npm install sharp@0.35.3 --save-exact

      - name: Verify high-severity audit
        run: npm audit --audit-level=high

      - name: Commit dependency files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git diff --cached --quiet || git commit -m "Patch sharp dependency"
          git push origin HEAD:phaseone
