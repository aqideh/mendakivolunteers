project_id = "mendakivolunteers"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public", "core"]
extra_search_path = ["public", "extensions", "core"]
max_rows = 1000

[api.tls]
enabled = false

[db]
port = 54322
shadow_port = 54320
major_version = 17

[db.migrations]
enabled = true
schema_paths = []

[db.seed]
enabled = true
sql_paths = ["./seed.sql"]

[realtime]
enabled = true

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[local_smtp]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "10MiB"

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/auth/confirm",
  "http://127.0.0.1:3000/auth/confirm"
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false
minimum_password_length = 12
password_requirements = "lower_upper_letters_digits"

[auth.rate_limit]
email_sent = 4
sms_sent = 0
anonymous_users = 0
token_refresh = 150
sign_in_sign_ups = 20
token_verifications = 20
web3 = 0

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
secure_password_change = true
max_frequency = "1m"
otp_length = 6
otp_expiry = 3600

[auth.email.template.magic_link]
subject = "Your MENDAKI Volunteer Portal sign-in link"
content_path = "./supabase/templates/magic_link.html"

[analytics]
enabled = false
